      - generic [ref=e103]:
        - heading "Armin Grotesk" [level=5] [ref=e105]
        - paragraph [ref=e107]: As a graphic designer, sometimes it’s impossible not to be inspired by the Swiss Style, specifically the work of Armin Hofmann, who is one of its best exponents. Grids and grotesk and neo-grotesk typefaces are a fundamental part of the tools that make this aesthetic possible. A visual language that has caused full admiration since we were students. Therefore, we decided to design Armin as an homage to Hofmann’s work. Technically, we added stylistic sets applied to the letters –G, R, a, g, h, l, m, n, r, t, u, y– to make Armin more eclectic and suitable for the creation of any visual language.

        - heading "CUSTOM TYPEFACES" [level=1] [ref=e44]
        - paragraph [ref=e45]:
          - text: We know every project involving typography is unique in its own way and sometimes it calls for something extra to make it shine. That's why we offer the creation of custom fonts, from scratch tailored to your needs.
          - text: We can also modify or extend existing typefaces, adding special characters, languages, or symbols.
          - text: The resulting typeface won't be commercialized and only you will be able to use it – and even give it a name!
      - generic [ref=e46]:
        - heading "W TYPE FOUNDRY" [level=1] [ref=e47]
        - paragraph [ref=e48]: W Type Foundry took its current shape in 2016, since then we’ve worked collectively publishing typefaces designed by us and collaborators.
        - paragraph [ref=e49]: Our goal is to produce quality fonts that meet current technological requirements keeping high aesthetic care. Our catalog offers designers, users, and brands a wide variety of typefaces ranging from super display fonts and emojis to sans serif fonts, and formal text fonts.
        - paragraph [ref=e50]: Additionally, we offer custom typography services as well as modifications and alterations to fonts from our catalog.
        - separator
        - heading "EVENTS" [level=1] [ref=e51]
        - paragraph [ref=e52]: "VIII Latin American Typography Biennial — Tipos Latinos. \x03"
        - paragraph [ref=e53]: In 2018 Magdalena Arasanz & Patricio Truenos were Regional event creatives, coordinators and producers.
        - paragraph [ref=e54]: — Tipos Latinos is an event dedicated to celebrate, promote and spread Latin American typography, it selects the best Latin American fonts every two years.
        - paragraph [ref=e55]: — The 8th Latin American Typography Biennial was held from October 22 to 27 - 2018 in Santiago, Chile. It consisted of 20 Conferences, 16 Workshops and a Typographic fair.
        - paragraph [ref=e56]: — Themes covered letters in general, different disciplines, applications and trades; lettering, calligraphy, digital typography, editorial design, posters, letterpress, experimental, printing methods and tools.
        - paragraph [ref=e57]: — Diego Aravena was selected to represent Chile as a jury for the VIII Latin American Typography Biennial — Tipos Latinos (2018).
        - separator
        - paragraph [ref=e58]: Charlas Mateas 2019.
        - paragraph [ref=e59]: In 2019 we organized and hosted a series of talks in our office space. This initiative was born from our curiosity about topics related to letters but not directly related to what we do.
        - paragraph [ref=e60]: The topics ranged from experimental sound typography (for DJs), programming and Glyphs automatization, to letterpress and lettering.
        - separator

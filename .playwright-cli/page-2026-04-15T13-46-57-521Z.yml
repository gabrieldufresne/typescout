      - generic [ref=e1992]:
        - paragraph [ref=e1993]: From an unexpected alignment of François Rappo’s longstanding interests in both mountaineering and type design, SuperScotch emerges as an original typeface inspired by the typography found in technical, adventure, and travel publications.
        - paragraph [ref=e1994]: As a point of departure, Rappo turned to “The Playground of Europe”, a classic early work of mountaineering literature that brings together the Alps, British explorers, and a Scotch-face. With this inspiration, Rappo set out to tackle the challenge of creating a new set of curves and structural tensions, which he mastered with remarkable finesse in SuperScotch. The typeface carries a distinctly vertical axis, echoing the imposing stance of Alpine peaks, along with a pronounced stroke contrast, beautiful serifs, and generous ball terminals.
        - paragraph [ref=e1995]: Offering a more pragmatic alternative to the severe neo-classical styles and positioned halfway between modern and transitional faces, SuperScotch channels this sense of historical shift. It also resonates with the turning point in the Victorian era when the Alps went from being thought of as a terrifying, sublime space to be understood as landscapes for recreation and exploration.
        - paragraph [ref=e1996]: "Featuring display styles that have a dramatic, commanding presence that is ideal for titles, SuperScotch is above all a versatile typeface. Its balance of rational and expressive features performs well across a wide range of contexts, from print to digital environments. True to Rappo’s practice, no detail has been left unattended: each weight has been drawn individually, without interpolation, giving every style integrity and its own carefully chiseled forms. The result is a modernist take on a modern face—precise, distinctive, and as cleanly defined as the Matterhorn’s ridgeline."

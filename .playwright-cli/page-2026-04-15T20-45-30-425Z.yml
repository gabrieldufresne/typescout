      - textbox [ref=e1242]:
        - generic [ref=e1246]: A star’s life begins with the gravitational collapse of a gaseous nebula of material largely comprising hydrogen, helium, and trace heavier elements. Its total mass mainly determines its evolution and eventual fate. A star shines for most of its active life due to the thermonuclear fusion of hydrogen into helium in its core. Stellar nucleosynthesis in stars or their remnants creates almost all naturally occurring chemical elements heavier than lithium.

      - textbox [ref=e1258]:
        - generic [ref=e1262]: Early astronomers recognized a difference between fixed stars, whose position on the celestial sphere does not change, and wandering stars (planets) which move noticeably relative to the fixed stars over days or weeks. Many ancient astronomers believed that the stars were permanently affixed to a heavenly sphere and that they were immutable. By convention, astronomers grouped prominent stars into asterisms and constellations.

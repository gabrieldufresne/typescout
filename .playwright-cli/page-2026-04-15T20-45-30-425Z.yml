      - textbox [ref=e1274]:
        - generic [ref=e1278]: Many stars are observed, and most or all may have originally formed in gravitationally bound, multiple-star systems. This is particularly true for very massive O and B class stars, 80% of which are believed to be part of multiple-star systems. The proportion of single star systems increases with decreasing star mass, so that only 25% of red dwarfs are known to have stellar companions.
    - generic [ref=e314]:
      - generic [ref=e315]:
        - heading "About Copernicus New Cond" [level=2] [ref=e316]
        - paragraph [ref=e317]: Tight beta 2024.01.29. The present beta represents the expected weight range and is kerned and tightly spaced. The default numeral set lining proportional, with lining tabular and oldstyle proportional also included. In the previous beta, the heaviest weight was much wider, being more of a semicondensed. As a result, all weights are now uniformly condensed. Galaxie New Condensed will be released before the end of 2024.Q1. Licensees of the Beta will receive the final files when they are released.
        - heading "Supported Languages" [level=2] [ref=e318]
        - paragraph [ref=e319]: Afrikaans, Albanian, Basque, Bosnian, Breton, Catalan, Corsican, Croatian, Czech, Danish, Dutch, English, Esperanto, Estonian, Faroese, Finnish, French, Galician, German, Greenlandic, Hungarian, Icelandic, Indonesian, Irish, Irish Gaelic, Italian, Kurdish, Latin, Latvian, Leonese, Lithuanian, Lower Sorbian, Luxembourgish, Malay, Maltese, Manx, Māori, Norwegian, Occitan, Polish, Portuguese, Rhaeto-Romanic, Romanian, Sami, Scots, Scottish Gaelic, Serbian, Slovak, Slovene, Slovenian, Spanish, Swahili, Swedish, Tagalog, Turkish, Upper Sorbian, Walloon, Welsh

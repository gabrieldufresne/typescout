      - generic [ref=e243]: Because Polaris lies nearly in a direct line with the Earth’s rotational axis above the North Pole—the north celestial pole—Polaris stands almost motionless in the sky, and all the stars of the northern sky appear to rotate around it. Therefore, it makes an excellent fixed point from which to draw measurements for celestial navigation and for astrometry. The elevation of the star above the horizon gives the approximate latitude of the observer.

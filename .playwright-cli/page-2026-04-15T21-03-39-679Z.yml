      - generic [ref=e297]: "Ursa Minor, also known as the Little Bear, is a constellation located in the far northern sky. As with the Great Bear, the tail of the Little Bear may also be seen as the handle of a ladle, hence the North American name, Little Dipper: seven stars with four in its bowl like its partner the Big Dipper. Ursa Minor was one of the 48 constellations listed by the 2nd-century astronomer Ptolemy, and remains one of the 88 modern constellations. Ursa Minor has traditionally been important for navigation, particularly by mariners, because of Polaris being the north pole star. Polaris, the brightest star in the constellation, is a yellow-white supergiant and the brightest Cepheid variable star in the night sky, ranging in apparent magnitude from 1.97 to 2.00. Beta Ursae Minoris, also known as Kochab, is an aging star that has swollen and cooled to become an orange giant with an apparent magnitude of 2.08, only slightly fainter than Polaris. Kochab and 3rd-magnitude Gamma Ursae Minoris have been called the guardians of the pole star or Guardians of The Pole. Planets have been detected orbiting four of the stars, including Kochab. The constellation also contains an isolated neutron star—Calvera—and H1504+65, the hottest white dwarf yet discovered, with a surface temperature of 200,000 K. Ursa Minor is bordered by Camelopardalis to the west, Draco to the west, and Cepheus to the east. Covering 256 square degrees, it ranks 56th of the 88 constellations in size. Ursa Minor is colloquially known in the US as the Little Dipper because its seven brightest stars seem to form the shape of a dipper (ladle or scoop). The star at the end of the dipper handle is Polaris. Polaris can also be found by following a line through the two stars—Alpha and Beta Ursae Majoris, popularly called the Pointers—that form the end of the bowl of the Big Dipper, for 30 degrees (three upright fists at arms’ length) across the night sky. The four stars constituting the bowl of the Little Dipper are of second, third, fourth, and fifth magnitudes, respectively, and provide an easy guide to determining what magnitude stars are visible, useful for city dwellers or testing one’s eyesight."
    - generic [ref=e298]:
      - generic [ref=e299]:
        - heading "About Polaris" [level=2] [ref=e300]
        - paragraph [ref=e301]: Polaris is as a teutonic grotesk, following in the tradition of Helvetica, Univers, Unica, and other unadorned modernist sans typefaces harkening back to the late-19th-century German grotesks. The Galaxie project was intended as a large “family of families”, all designed to work together, with Polaris as the first member completed and released, followed by the script typeface Cassiopeia, then the serif Copernicus. Polaris was named for the pole star, and is the reference point for the development of the rest of the families. The typeface was an early multilingual design, incorporating accented and other glyphs to cover a large number of languages using the Latin script. V4 includes the Cyrillic script.
        - paragraph [ref=e302]: Originally released 2004.07 as Galaxie Polaris. “Galaxie” was dropped for V4, 2013.09.
        - heading "Supported Languages" [level=2] [ref=e303]
        - paragraph [ref=e304]: Afrikaans, Albanian, Basque, Bosnian, Breton, Catalan, Corsican, Croatian, Czech, Danish, Dutch, English, Esperanto, Estonian, Faroese, Finnish, French, Galician, German, Greenlandic, Hungarian, Icelandic, Indonesian, Irish, Irish Gaelic, Italian, Kurdish, Latin, Latvian, Leonese, Lithuanian, Lower Sorbian, Luxembourgish, Malay, Maltese, Manx, Māori, Norwegian, Occitan, Polish, Portuguese, Rhaeto-Romanic, Romanian, Sami, Scots, Scottish Gaelic, Serbian, Slovak, Slovene, Slovenian, Spanish, Swahili, Swedish, Tagalog, Turkish, Upper Sorbian, Walloon, Welsh

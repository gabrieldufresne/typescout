      - generic [ref=e270]: IN ANTIQUITY, POLARIS WAS NOT YET THE CLOSEST NAKED-EYE STAR TO THE CELESTIAL POLE, AND THE ENTIRE CONSTELLATION OF URSA MINOR WAS USED FOR NAVIGATION RATHER THAN ANY SINGLE STAR. POLARIS MOVED CLOSE ENOUGH TO THE POLE TO BE THE CLOSEST NAKED-EYE STAR, EVEN THOUGH STILL AT A DISTANCE OF SEVERAL DEGREES, IN THE EARLY MEDIEVAL PERIOD, AND NUMEROUS NAMES REFERRING TO THIS CHARACTERISTIC AS POLAR STAR HAVE BEEN IN USE SINCE THE MEDIEVAL PERIOD.

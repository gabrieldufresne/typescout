      - generic [ref=e216]: Although appearing to the naked eye as a single point of light, Polaris is a triple star system, composed of the primary, a yellow supergiant designated Polaris Aa, in orbit with a smaller companion, Polaris Ab; the pair is in a wider orbit with Polaris B. The outer pair AB were discovered in August 1779 by William Herschel, where the A refers to what is now known to be the Aa/Ab pair.

      - generic [ref=e50]:
        - paragraph [ref=e51]:
          - text: Markelius Sans is based on hand-drawn interpretations of Helvetica found in the archives of
          - link "Folkets Hus" [ref=e52] [cursor=pointer]:
            - /url: https://houseofpeople.se/en/history
          - text: at Norra Bantorget in Stockholm. The building, a Functionalist masterpiece, was designed by architect Sven Markelius, who played a central role in Stockholm’s post-war urban planning. Among architectural drawings and signboards, these letters were discovered. When the building was inaugurated in 1960, they were used for signage spelling “stadsteatern”, “kongresshallen”, “baldakinen”, and “pelarsalen”. In 1991, signage for “dansens hus” was added, produced using the same limited set of letters.
        - paragraph [ref=e53]: "An antidote to the perfectionism of contemporary typography, the typeface carries an inherent charm that cannot be constructed with Bézier curves alone. Each letter was digitised directly from the source material, with missing characters drawn to follow the same underlying logic. Sixty-six years later, Markelius Sans is released in four weights with italics. The typeface includes a unicase stylistic set and four arrow sets: circled and uncircled, each adapted for lowercase and capital-height alignment."
        - paragraph [ref=e54]:
          - text: Commissioned by
          - link "Figur" [ref=e55] [cursor=pointer]:
            - /url: https://figur123.com
          - text: as part of the new signage system designed for the reopening of Folkets Hus in 2025.

        - paragraph [ref=e44]: Adelia is a flare serif influenced by Nordic arts and culture of the early 1900s. With romantic and organic yet straightforward characteristics it pays homage to the final decades of classicism.
        - paragraph [ref=e45]: While looking for inspiration across architecture, books and paintings we came across Walter KГӨchвҖҷs typographic poster for the вҖңContemporary Swiss ArtsвҖқ exhibition at (Nationalmuseum) in 1950. Although not originated from the same era, it had a lot of the characteristics we were looking for.
        - paragraph [ref=e46]: Elegant and robust by default, powered with unusual and quirky alternates and ligatures.
        - paragraph [ref=e47]: Adelia was updated with Vietnamese language support in 2026.

        - paragraph [ref=e44]:
          - text: Ivar began with the idea of creating a serif companion for
          - link "Siri" [ref=e45] [cursor=pointer]:
            - /url: https://lettersfromsweden.se/font/siri/
          - text: . During its development, it became apparent that typographic siblings don’t necessarily need to have a uniform design. After three years of drawing and perfecting the letterforms, the only shared characteristics that remain are the shapes of the terminals.
        - paragraph [ref=e46]: "Rather than being a revival, Ivar is strongly influenced by the grace and sturdy construction of Times. The typeface stands on the shoulders of giants: the design refers to the dependable text faces from the mid-1900s, which in turn were rooted in classic designs from the 16th and 17th century."
        - paragraph [ref=e47]:
          - text: Ivar comes in three optical sizes. Each sub-family consists of four weights with matching italics, for a total of 24 fonts. The names of the optical sizes—
          - link "Text" [ref=e48] [cursor=pointer]:
            - /url: https://lettersfromsweden.se/font/ivar-text/
          - text: ","
          - link "Headline" [ref=e49] [cursor=pointer]:
            - /url: https://lettersfromsweden.se/font/ivar-headline/
          - text: ", and"
          - link "Display" [ref=e50] [cursor=pointer]:
            - /url: https://lettersfromsweden.se/font/ivar-display/
          - text: —suggest how they should be applied, yet we encourage users to practice typography as they see fit.
        - paragraph [ref=e51]:
          - text: In March 2020 we added the fourth optical size to Ivar – a high contrast version we call
          - link "Ivar Fine" [ref=e52] [cursor=pointer]:
            - /url: https://lettersfromsweden.se/font/ivar-fine/
          - text: .

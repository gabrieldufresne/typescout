    - generic [ref=e45]:
      - paragraph [ref=e50]: Type-Ø-Tones is a typographic design company founded in 1990 by Joan Barjau, Enric Jardí, Laura Meseguer and José Manuel Urós. Although we mainly publish our own designs, we collaborate with many other typographers. Below there is more information about us and our colleagues.

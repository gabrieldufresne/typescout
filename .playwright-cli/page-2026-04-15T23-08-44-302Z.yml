          - paragraph [ref=e81]: Enric Jardí
          - generic [ref=e82]:
            - generic [ref=e83]:
              - paragraph [ref=e84]: Was born in Barcelona in 1964. He studied graphic design at Elisava and has been teaching there since 1988. Since 1983 he has worked in a number of different studios, and in 1992 he was one of the founders of Propaganda studio. In 1998 he started up on his own studio.
              - paragraph [ref=e85]: His work is focused on typography, magazine design, book covers and corporate design.
              - paragraph [ref=e86]: He is the director of the Master on Advanced Typography at the Eina school of art and design, in collaboration with the Autonomous University of Barcelona.
              - paragraph [ref=e87]: In collaboration with Marcus Villaça, he has developed editorial projects such as the redesigning of the Chicago Reader and the Boston Phoenix.
              - paragraph [ref=e88]: He is the author of the book Twenty-two tips on typography (that some designers will never reveal) and twenty-two things you should never do with typefaces (that some typographers will never tell you) published by Actar.

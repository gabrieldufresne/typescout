      - paragraph [ref=e192]: Authors, colleagues and inspirational friends
      - separator [ref=e197]
      - generic [ref=e198]:
        - generic:
          - paragraph [ref=e201]: Marcela Aguilera
          - generic [ref=e202]:
            - generic [ref=e203]:
              - generic [ref=e204]:
                - text: Marcela Aguilera Casanueva is a graphic designer, Master in Advanced Typography, specialized in editorial design, a university teacher, and an expert in calligraphy. She studied Graphic Design at Instituto Santo Tomás in Puerto Montt, pursued a Diploma in Typography and Lettering at the University of Chile in Santiago, and completed a Master’s in Advanced Typography at EINA, Barcelona.
                - text: Since 2015, she has conducted workshops on calligraphic styles and tools. She combines editorial design with teaching, offering classes at UTEM, Arcos, and UDD. Since 2022, she has collaborated in the "Encuentros de Tipografía de la UTEM". She was one of the hosts of the “PodCasType” (Chile, Argentina, Barcelon/Spain & Germany).
                - text: In 2020, her typeface “Gotta” was selected for the commemorative publication 15 Years of the Advanced Typography Master’s at EINA. In 2024, she received the Recognition for Community Engagement Initiatives awarded by UTEM.
              - link "https://www.instagram.com/lanascribe/" [ref=e206] [cursor=pointer]:
                - /url: https://www.instagram.com/lanascribe/

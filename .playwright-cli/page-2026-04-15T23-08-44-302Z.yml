          - paragraph [ref=e254]: Juan Luis Blanco
          - generic [ref=e255]:
            - generic [ref=e256]:
              - paragraph [ref=e257]: Juan Luis Blanco is a graphic designer, type designer and calligrapher based in Zumaia (Spain). He has worked as a freelancer graphic designer from 1997, and in 2013, he attained an MA in Typeface Design at the University of Reading. During the MA in Typeface Design he developed Amaikha, a multi-script font family comprising Latin, Greek, Cyrillic, Arabic and Tifinagh. Currently he combines calligraphy classes and graphic design with typographic projects that focus in the Basque lettering style as well as multi script typefaces involving the Latin, Arabic and Tifinagh alphabets. He loves designing typefaces and maintains a healthy balance by rock-climbing.
              - paragraph [ref=e258]:

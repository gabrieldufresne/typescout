              - paragraph [ref=e463]: Maria Montes is an independent type and lettering designer specialising in premium branding assets for cultural institutions and the luxury market. Montes is also a calligraphy and type educator since 2014.
              - paragraph [ref=e464]: Her creative practice is set by the principles of never stop learning, sharing knowledge, and evoking emotion through her work.
              - paragraph [ref=e465]: In 2011, Maria completed a Postgraduate Degree in Advanced Typography in Barcelona, followed by an Intensive Type Design Program at The Cooper Union in New York City. In 2018, she published her first display font family called Green Fairy.

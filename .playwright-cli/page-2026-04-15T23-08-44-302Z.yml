            - generic [ref=e485]:
              - paragraph [ref=e486]: "Flavio Morais was born in São Paulo, Brasil, where he started to work as a illustrator for a T-Shirt company, then he moved to London and attended an Art and Design course at Chelsea School of Art and finally ended up in Barcelona where he still lives and works for press, editorials, advertising and Mural paintings. Some of his clients include: Once, La Vanguardia, El País, El Mundo, Avui, Saatchi & Saatchi, Canal +, Spanish TV, Volkswagen, Coca-Cola, Café Ducados (Madrid), Sampaka (Valencia), Cocktail bar Negroni (Barcelona), Restaurant Spin (Shangai)"
              - paragraph [ref=e487]: Apart from the comission works he also made several individual exhibitions.
              - paragraph [ref=e488]: He has a especial love for the Popular Culture in Africa, Bahia, Mexico and works done by people without any knowledge of Art, art brut and outsiders.

          - paragraph [ref=e151]: José Manuel Urós
          - generic [ref=e152]:
            - generic [ref=e153]:
              - paragraph [ref=e154]: Is a self-taught programmer, typo(graphic) designer and guitar player. Also a reluctant barcelonian, where he was born in 1956. A programmer in the eighties, he became the happiest/luckiest guy when switched from awful code to desktop publishing at the very launch of the technology, around 1988. From that year, he has helped a number of studios to develop their skills at electronic publishing.
              - paragraph [ref=e155]: From 1992 to 2011, Josema developed a close relationship with the Estudio Mariscal, where he cared for the Macs, the typography, the editorial design and the becarias. Teaching begin in 1993, with courses on interface and icon design, and typography. He teaches at Eina, IED and IDEP.
              - paragraph [ref=e156]: Also, somehow, he manages to have a musical life, having played with Bootunoo, New Buildings, MCW, La Fura dels Baus, Leo Mariño, Josep Giménez, Elements, Pangrams, Pascal Comelade, PAD, Adrián Morales, Unoma, Altaba/Samsó/Urós and GRUS, among others. His latest noises had been made with Les Cocos and Stock de Coque.
            - link "Read More" [ref=e157] [cursor=pointer]:
              - /url: "#"

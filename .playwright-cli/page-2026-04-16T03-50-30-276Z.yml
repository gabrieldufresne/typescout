        - paragraph [ref=e1311]
        - paragraph [ref=e1312]: Factor A is a functional geometric grotesk, in a sense synthesizing the sans serif designs created in the beginning of the 20th century. Despite the cold geometry specific to this style, Factor A has warmth, thanks to, for example, a double-storey default a, or a somewhat classic t. If you are looking for a neutral or a more rounded/smooth feel there are also 2 sets of alternates for lowercase letters.
        - paragraph [ref=e1313]
        - paragraph [ref=e1314]: To name a few other font features, it has the same hight for caps and ascenders, low contrast, and a large palette of widths and weights, creating a perfect geometric sans workhorse type family. Factor A has a large choice of alternates, enabled by the concept of the hand-drawn loop. These alternates can be used to funk up your titles and logos. Factor A can be used at both display and text sizes for branding, web, signage… etc.

      - textbox [ref=e662]: В 1839 году сестра Томаса Эллен вышла замуж за медика Джона Чарльза Кука, чьим учеником стал Томас. В 1841 году он перешёл от Кука к гипнотизёру Томасу Чандлеру, а позже в то же году перебрался на жительство к ещё одной сестре, Элизабет, и её мужу Джону Солту. Тот преподавал судебную медицину в частном Сиднемском колледже. Учёба в этом заведении была недорогой, что позволило Хаксли начать заниматься в нём осенью 1841 года.

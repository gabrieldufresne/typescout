      - textbox [ref=e93]: As the world’s ocean is the principal component of Earth’s hydrosphere, it is integral to life, forms part of the carbon cycle, and influences climate and weather patterns. The ocean is the habitat of 230,000 known species, but because much of it is unexplored, the number of species in the ocean is much larger, possibly over two million. The origin of Earth’s oceans is unknown; A sizable quantity of water would have been in the material that formed the Earth. Water molecules would have escaped Earth’s gravity more easily when it was less massive during its formation due to atmospheric escape. Oceans are thought to have formed in the Hadean eon and may have been the cause for the emergence of life.

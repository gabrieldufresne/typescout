      - textbox [ref=e119]: «Tennis Court» (с англ. — «Теннисный корт») — песня новозеландской певицы Лорд с дебютного студийного альбома Pure Heroine. Композиция была издана на лейбле Universal Music Group в качестве второго сингла в поддержку альбома 7 июня 2013 года. Также был выпущен Tennis Court EP, включавший в себя три дополнительных трека. В Соединённых Штатах сингл является четвёртым с альбома. Написанная Лорд в сотрудничестве с продюсером Джоэлом Литтлом, песня сочетает в себе инди-поп, арт-поп и электропоп с элементами даунтемпо, хип-хопа и EDM. В инструментальный состав входят синтезаторы и электронные тактусы. В лирике певица обращается к недавно обретённой славе и критикует «величественную жизнь»

        - paragraph [ref=e144]
        - paragraph [ref=e145]: Algorytm is a versatile Collection of Sans Serif font families inspired by early gothis such as Times Gothic, Inland Gothic N6, or Gothic N2. Infused with a modern aesthetic and a systematic approach, the design strategy prioritizes multifunctionality, diversity, and flexibility, catering to a myriad of design needs and providing a comprehensive toolbox for visual projects.
        - paragraph [ref=e146]
        - paragraph [ref=e147]: "The Algorytm collection comprises six type families: Algorytm, Algorytm Clear, Algorytm Mono, Algorytm Flip, Algorytm Soft, and Algorytm Sport, totaling 51 styles. The standard Algorytm version makes a bold statement, ideal for larger sizes, while Algorytm Clear is tailored for legibility in extended text passages. Algorytm Flip is a reverse contrast companion, while Algorytm Soft is a friendly version with rounded corners. Algorytm Sport is the standout member of the family, embodying a vibrant and healthy appearance. Designed for an energetic touch, it adds zest to layouts with its lively inline letters, injecting vibrancy into your designs."
        - paragraph [ref=e148]
        - paragraph [ref=e149]: With its abundance of variations, alternates, features, and special characters, Algorytm stands out as a versatile choice, well-suited for a wide spectrum of design scenarios.

      - textbox [ref=e295]: "Развернутое учение о дружбе даёт и Аристотель в «Никомаховой этике». Аристотель различал три вида дружбы: дружбу, основанную на взаимной пользе; дружбу, преследующую удовольствие, и дружбу, основанную на добродетели. Первые два вида дружбы являются низшими; здесь люди любят не друг друга, а только ту пользу или то удовольствие, которое достигается в их общении. Такая дружба не может быть продолжительной, так как с исчезновением пользы или удовольствия исчезает и сама дружба. Истинная дружба — это дружба, основанная на добродетели. Здесь дружба имеет цель сама в себе и сохраняется до тех пор, пока люди, разделяющие её, остаются хорошими, добродетельными. Вместе с тем дружба, основанная на добродетели, включает в себя и взаимную пользу и удовольствие. Предполагая равенство участвующих в ней лиц, дружба тесно связана со справедливостью и теми условиями государственной жизни, в которой проявляется эта справедливость. «Дружба во всех формах государственного устройства проявляется настолько же, насколько справедливость». В соответствии с этим Аристотель утверждал, что при тираническом правлении дружба либо вовсе отсутствует, либо же занимает весьма незначительное место. «… Там не может быть дружбы, где нет ничего общего между правителем и управляемыми; нет места и справедливости…». Напротив, больше всего дружба проявляется в демократиях, так как здесь граждане, «… будучи равными, имеют много общих интересов». Совершенство общественной жизни состоит, по Аристотелю, в справедливости, соединенной с дружбой. Аристотель считал, что друзья есть то благо, которым в числе прочих должен обладать счастливый человек, целью дружбы он видел взаимное совершенствование в добродетели"

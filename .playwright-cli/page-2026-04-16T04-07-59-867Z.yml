      - textbox [ref=e241]: Aristoteles hält Freundschaft nicht für ein graduelles Phänomen, bei dem einem der eine Mensch mehr Freund ist als der andere, sondern er kategorisiert die verschiedenen Freundschaften. Als erstes teilt er sie in die „Freundschaft unter Gleichen“ und die „Freundschaft unter Ungleichen“ und schließt gleichzeitig die Freundschaft zu unbeseelten Dingen aus. Aristoteles bezieht sich mit dieser Philia-Systematik auf Platons Dialog Lysis, in dem kategorial souverän und künstlerisch spielend das Problem der selbstlosen Freundschaft entfaltet wird. Die Freundschaft unter Gleichen gilt für gleichgestellte Bürger, sie sind einander ebenbürtig. Diese Freundschaft unterteilt er weiter in Nutzen-, Lust- und Tugendfreundschaft. Die Nutzenfreundschaft bringt die Menschen zu einem Zweck zusammen. Fällt dieser Zweck weg, ist die Freundschaft gefährdet. Ähnliches gilt für die Lustfreundschaft, die rein affektiv begründet ist. Diese beiden Arten sind akzidentiell und labil. Stabil dagegen ist die Tugend- oder Charakterfreundschaft. Sie ist die Freundschaft um des Freundes willen. Hier kommt Aristoteles’ Mesotes-Lehre ins Spiel, deren Maxime zufolge das Maßhalten der Weg zu einem tugendhaften und erfüllten Leben ist. Sind sich zwei Personen in ihrer Tugendhaftigkeit ähnlich, so ist das die Voraussetzung für die vollkommene Freundschaft. Wie für jegliche Tugend gilt auch für die Freundschaft bei Aristoteles, dass sie durch wiederholtes Handeln zur Gewohnheit werden muss. Freundschaft wird nur im alltäglichen Umgang ausgeübt. Die Teilhabe am Leben des Freundes und damit die räumliche Nähe sind nach Aristoteles für eine Freundschaft unerlässlich. Die Freundschaft unter Ungleichen bei Aristoteles würde vermutlich eher als Ehrerbietung bezeichnet. Sie beschreibt nicht nur das Verhältnis zwischen den Generationen, sondern auch das Verhältnis des Menschen zum Staat. So muss nach Aristoteles die Asymmetrie der Hierarchie durch einen Mehraufwand von philia seitens des Unterlegenen ausgeglichen werden. Der Sohn muss dem Vater mehr Respekt entgegenbringen als umgekehrt, so wie der Bürger mehr in den Staat investiert, als er unmittelbar zurückbekommt

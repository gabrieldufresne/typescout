      - textbox [ref=e146]: В Древней Греции понятие дружбы становится предметом специальных философских и этических трактатов. Демокрит, Эпикур, Аристотель подчеркивали её земной, чувственный характер, способствующий достижению основной, по их мнению, цели жизни — разумного удовольствия. «Дружба, — говорил Эпикур, — обходит с пляской Вселенную, объявляя нам всем, чтобы мы пробуждались к прославлению счастливой жизни». Говоря о бескорыстном характере дружбы, Эпикур вместе с тем связывал её с пользой. «Всякая дружба желанна ради себя самой, а начало она берет из пользы»

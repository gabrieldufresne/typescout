          - strong [ref=e371]: Riegraf, a quick story
        - paragraph [ref=e372]
        - paragraph [ref=e373]: Riegraf was born out of an idea of designing a Serif typeface that feels like a geometric Sans-serif grotesk, while preserving the elegance usually associated with Serif typefaces.
        - paragraph [ref=e374]
        - paragraph [ref=e375]: The result is a fusion Serif typeface that has simple square slab serifs, high contrast letters, that bring elegance, as well as low contrast letters and numerals/currencies, that might look like they belong to a Sans-serif typeface. This mixed design approach aims to create something truly unique and innovative. In short Riegraf could be described as a Geometric Fusion Serif.
        - paragraph [ref=e376]
        - paragraph [ref=e377]: Riegraf was designed as a “friend” companion to Riegla, a non-neutral grotesk font family also available on intervaltype.com. These two families share many commonalities and will work well together creating a page that truly stands out typographically.

        - paragraph [ref=e82]: At the original shoreline by the mouth of Strawberry creek, the mound was once 30 feet high and a hundred yards long, a pyramid of shell and earth, a burial ground for ancestors of the Ohlone Indians, a sacred site. The Ohlone people lived here continuously from around 3,700 B.C. until 800 A.D., when they moved their village, and thereafter used the mound as a ceremonial site.
        - paragraph [ref=e87]: The mound is the earliest inhabited location in the Bay Area. Contrary to Harper’s misinformation, archaeologists have recovered large numbers of tools and ornaments from the mound, and 95 human burials. Most of the artifacts are stored in the catacombs of U.C. Yes, the above-ground part shellmound was leveled and paved over. But much of the below-ground part remains intact today, extending up to 20' in some parts, under parking lots, streets, railroad tracks, and buildings.

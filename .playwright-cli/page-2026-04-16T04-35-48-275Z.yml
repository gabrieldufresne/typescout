        - generic [ref=e130]: Black Sabbath's Finest
      - generic [ref=e133]:
        - paragraph [ref=e138]: Most people tend to overlook this album, which to me is quite a shame. Whilst the first 3 albums are indeed heavy metal classics, the material on this album is just total lightyears ahead of anything else Sabbath has done. It has it all, the doom, the heavy, the slow, the weird, the folk, the blues...it's just everything Black Sabbath has ever been associated piled into 43 minutes of complete sonic bliss. From the bluesy and lethargic intro of "Wheels of Confusion" to the down right doom of "Cornucopia", this album is absolutely perfect, aside from one glitch. I understand it's probably something of a drug induced experiment, "FX" just isn't necessary to the album. Had the album progressed from the tear jerking "Changes" straight to "Supernaut", the contrast between the two songs would have made a much welcome change as opposed to having
        - paragraph [ref=e143]:
          - generic [ref=e144]:
            - text: to skip "FX" in between. But, all that garbage aside, what we have here is Iommi has his absolute prime, Bill Ward as his most technical and Geezer Butler with some of the best bass work you'll ever hear. And not to forget Ozzy's vocal performance, I don't think this album would have worked had Dio done vocals on it, in the same way Ozzy just wouldn't sound right on the Dehumanizer album.
            - generic [ref=e145]: To me this album is the definitive album in the "Classic Sabbath" era with Ozzy, it covers all they done together, from their doomy and gloomy beginnings, to their more progressive and technical sound on their later albums together. If the classic line up ever does another album together, one can only hope it's as good as Volume 4, which to me stands as the pinnacle record in the Black Sabbath discography. Every metal fan should own this LP.

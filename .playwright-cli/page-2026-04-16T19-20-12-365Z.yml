            - generic [ref=e61]: Inspired by the hand lettering of 20th century book designer and calligrapher Oscar Ogg, Ogg captures the unique mix of calligraphic and typographic form he achieved through his use of hand carved pen nibs, brushes, and white-out. Signature moves found throughout Ogg’s calligraphic works were explored, exaggerated, and refined in the high contrast design space of Ogg. The original lettering samples are a combination of calligraphic stroke, contour drawing, and white-out (reduction). This combination of calligraphic and constructed forms became the perfect jumping off point for typographic exploration.

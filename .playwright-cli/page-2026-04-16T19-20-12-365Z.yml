                    - paragraph [ref=e471]: “I don’t live for fashion, I live for beauty and style.” So says haute couture eminence grise Andre Leon Talley in the opening seconds of Kate Novack’s The Gospel According to Andre, and the director takes those words as gospel. The documentary is a deeply loving, frequently beautiful testament to the former Vogue editor, who rose from humble beginnings in North Carolina to become arguably the high fashion world’s first major African-American tastemaker, as well as the type of multi-lingual, Russian-lit-citing public intellectual who is perfectly at ease gossiping on TV with Wendy Williams. At times hesitant to press Talley on some uncomfortable but important aspects of his life, the film amounts to essentially a long, intimate brunch conversation with its inimitable subject, and for those with even a passing interest in fashion, that should be plenty. There are plenty of famous names who show up to sing Talley’s praises – Tom Ford, Diane von Furstenberg, Marc Jacobs, Manolo Blahnik, and of course Talley’s primary foil Anna Wintour, who credits him for teaching her about fashion in her earliest days as Vogue editor-in-chief – but some of the most memorable anecdotes come from his childhood friends. Through them and Talley’s memories, we get a crystal clear image of the fashionista as a young man, raised by his beloved grandmother, and eternally
                  - link [ref=e472] [cursor=pointer]:
                    - /url: /typefaces/ogg-text
                    - generic [ref=e475]:
                      - generic [ref=e477]: Ogg Text Light and Light Italic
                      - generic [ref=e478]: "16"
                    - paragraph [ref=e482]: "Best known for his long association with Vogue, Talley has long stood out even in the peacockish world of couture: his imposing six-and-a-half-foot profile, usually decked out in lavish capes and jackets, is as much a staple of Paris runways as flashbulbs and champagne flutes. Alongside plenty of vintage footage, Novack follows him around New York City, his home in White Plains, and his hometown of Durham throughout the summer and fall of 2016, giving fly-on-the-wall access as he dresses famous friends and mulls on the upcoming presidential election. “Gospel” is Novack’s first solo feature, though she co-directed “Eat This New York” with husband Andrew Rossi, whose “Page One: Inside the New York Times” she also produced, and she seems to have an implicit understanding that shot composition is every bit as important in a documentary as in a narrative feature. She and cinematographer Bryan Sarkinen capture some wonderful imagery here, and she does deft work to weave in eye-popping runway footage from fashion eras past and present."

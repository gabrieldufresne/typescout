                    - paragraph [ref=e361]: It’s easy, I think, to dismiss ways of being as cultural contributions, but I believe that people are culture. How they live and move and myth-make and endure and drape and pose and want and want and want and observe and comment and declare. That’s culture. Andre Leon Talley’s sense of self was culture. And, I argue, it was culture at its best. One look at him and you wanted more for yourself.

                  - paragraph [ref=e785]: "Some limestones do not consist of grains at all, and are formed completely by the chemical precipitation of calcite or aragonite, i.e. travertine. Secondary calcite may be deposited by supersaturated meteoric waters (groundwater that precipitates the material in caves). This produces speleothems, such as stalagmites and stalactites. Another form taken by calcite is oolitic limestone, which can be recognized by its granular (oolite) appearance. The primary source of the calcite in limestone is most commonly marine organisms. Some of these organisms can construct mounds of rock known as reefs, building upon past generations. Limestone has numerous uses: as a building material, an essential component of concrete (Portland cement), as aggregate for the base of roads, as a chemical feedstock for the production of lime, as a soil conditioner, and for rock gardens. The primary source of the calcite in limestone is most commonly marine organisms. Some of these organisms can construct mounds of rock known as reefs, building upon past generations. Limestone has numerous uses: as a building material, an essential component of concrete (Portland cement), as aggregate for the base of roads, as a chemical feedstock for the production of lime, as a soil conditioner, and for rock gardens."
                - link [ref=e786] [cursor=pointer]:
                  - /url: /typefaces/ogg-text
                  - generic [ref=e789]:
                    - generic [ref=e791]: Ogg Text Medium
                    - generic [ref=e792]: "12"
                  - paragraph [ref=e796]: "In the US, aragonite in the form of stalactites and “cave flowers” is known from Carlsbad Caverns and other caves. Massive deposits of oolitic aragonite sand are found on the seabed in the Bahamas. ragonite is the high pressure polymorph of calcium carbonate. As such, it occurs in high pressure metamorphic rocks such as those formed at subduction zones. Aragonite forms naturally in almost all mollusk shells. The type location for aragonite is Molina de Aragón in the Province of Guadalajara in Castilla-La Mancha, Spain, for which it was named in 1797. The mineral is not named for the region of Aragon: Molina de Aragón is located in the historic region of Castile. Turquoise is insoluble in all but heated hydrochloric acid. Its streak is a pale bluish white and its fracture is conchoidal, leaving a waxy lustre. Despite its low hardness relative to other gems, turquoise takes a good polish. Turquoise may also be peppered with flecks of pyrite or interspersed with dark, spidery limonite veining."
                - link [ref=e797] [cursor=pointer]:
                  - /url: /typefaces/ogg-text
                  - generic [ref=e800]:
                    - generic [ref=e802]: Ogg Text Bold
                    - generic [ref=e803]: "12"
                  - paragraph [ref=e807]: Aragonite also forms in the ocean and in caves as inorganic precipitates called marine cements and speleothems, respectively. Aragonite is not uncommon in serpentinites where high Mg in pore solutions apparently inhibits calcite growth and promotes aragonite precipitation. Aragonite is metastable at the low pressures near the Earth’s surface and is thus commonly replaced by calcite in fossils. Aragonite older than the Carboniferous is essentially unknown. It can also be synthesized by adding a calcium chloride solution to a sodium carbonate solution. As a secondary mineral, turquoise forms by the action of percolating acidic aqueous solutions during the weathering and oxidation of preexisting minerals. For example, the copper may come from primary copper sulfides such as chalcopyrite or from the secondary carbonates malachite or azurite; the aluminium may derive from feldspar; and the phosphorus from apatite. Climate factors appear to play an important role as turquoise is typically found in arid regions, filling or encrusting cavities and fractures in typically highly altered volcanic rocks, often with associated limonite and other iron oxides.
                - link [ref=e808] [cursor=pointer]:
                  - /url: /typefaces/ogg-text
                  - generic [ref=e811]:
                    - generic [ref=e813]: Ogg Text ExtraBold
                    - generic [ref=e814]: "12"
                  - paragraph [ref=e818]: In aquaria, aragonite is considered essential for the replication of reef conditions. Aragonite provides the materials necessary for much sea life and also keeps the pH of the water close to its natural level, to prevent the dissolution of biogenic calcium carbonate. Aragonite has been successfully tested for the removal of pollutants like zinc, cobalt and lead from contaminated wastewaters. Aragonite is thermodynamically unstable at standard temperature and pressure, and tends to alter to calcite on scales of 107 to 108 years. The mineral vaterite, also known as μ-CaCO3, is another phase of calcium carbonate that is metastable at ambient conditions typical of Earth’s surface, and decomposes even more readily than aragonite. For example, the copper may come from primary copper sulfides such as chalcopyrite or from the secondary carbonates malachite or azurite; the aluminium may derive from feldspar; and the phosphorus from apatite. Climate factors appear to play an important role as turquoise is typically found in arid regions, filling or encrusting cavities and fractures in typically highly altered volcanic rocks, often with associated limonite and other iron oxides.

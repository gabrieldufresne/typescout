                    - paragraph [ref=e351]: Luxury or nothing. There is so much to say about Andre Leon Talley and nothing said will ever be enough. No one person, not even ALT himself, could be counted on to weave all of his glories and hitches into a complete, fitting and accurate garment. We will have to depend on one another to create this last ensemble. So, this morning, I just want to celebrate how he moved through the world.

                  - paragraph [ref=e774]: "Like most other sedimentary rocks, most limestone is composed of grains. Most grains in limestone are skeletal fragments of marine organisms such as coral or foraminifera. These organisms secrete shells made of aragonite or calcite, and leave these shells behind when they die. Other carbonate grains comprising limestones are ooids, peloids, intraclasts, and extraclasts. Limestone often contains variable amounts of silica in the form of chert (chalcedony, flint, jasper). Limestone has numerous uses: as a building material, an essential component of concrete (Portland cement), as aggregate for the base of roads, as white pigment or filler in products such as toothpaste or paints, as a chemical feedstock for the production of lime, as a soil conditioner, or as a popular decorative addition to rock gardens. The primary source of the calcite in limestone is most commonly marine organisms. Some of these organisms can construct mounds of rock known as reefs, building upon past generations. Limestone has numerous uses: as a building material, an essential component of concrete (Portland cement), as aggregate for the base of roads, as a chemical feedstock for the production of lime, as a soil conditioner, and for rock gardens."

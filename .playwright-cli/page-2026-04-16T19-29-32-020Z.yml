            - generic [ref=e53]: "Doyle is a period piece, a loving synthesis of 2 iconic styles that became the visual backdrop of a generation. The darkest master is Lucas Sharp’s ode to Cooper Black drawn from memory, and on the light end of the spectrum the chubby organic forms suck it in and take on a style reminiscent of ITC American Typewriter. While Doyle takes many cues from these 2 sources, their reinterpretation and amalgamation form something new entirely: a coherent family that is both structured and loose, with an inky wetness that is positively brimming with life. Doyle was designed by Lucas Sharp and Marc Rouault in 2019."

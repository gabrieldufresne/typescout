        - heading "A familiar Humanist with Fizz." [level=2] [ref=e938]
        - paragraph [ref=e940]:
          - text: PP Paloma is a spritzy sans family of a dual geo-humanist nature. Designed for versatility, the typeface spans across the two genres, combining the best of both worlds. Paloma is loosely inspired by the giants like Antique Olive, Johnston and Avenir, but treats the references lightheartedly, going for a different route with a flair.
          - text: One part of the family is toned-down and humanist, featuring open shapes, natural letterforms and balanced proportions, intended for subtle roles when reading comfort and legibility are crucial. The other subfamily, Fizzy, cranks up the flavor all the way up, turning the shapes geometric, tightening spacing and making details more crisp and accentuated, perfect for juicy large-size uses.
          - text: "While not a typical “workhorse” grotesk, Paloma is crafted to be adaptive for a wide range of applications from long-form reading to headlines and posters; from soft neutrality to memorable resonance. The font family comes in 28 styles: 2 subfamilies of 7 weights plus italics; all also available in the variable format. It includes many OpenType features for professional typesettings and supports a wide range of Latin-based languages."

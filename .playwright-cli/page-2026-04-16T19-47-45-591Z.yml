        - generic [ref=e215]: One part of the family is toned-down and humanist, featuring open shapes, natural letterforms and balanced proportions, intended for subtle roles when reading comfort and legibility are crucial. The other subfamily, Fizzy, cranks up the flavor all the way up, turning the shapes geometric, tightening spacing and making details more crisp and accentuated, perfect for juicy large-size uses.

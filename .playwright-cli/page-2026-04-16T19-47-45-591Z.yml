        - generic [ref=e230]: "Paloma is loosely inspired by the giants like Antique Olive, Johnston and Avenir, but treats the references lightheartedly, going for a different route with a flair. This duality becomes especially clear in the structure of the family itself. Paloma is divided into two complementary subfamilies that explore the concept from different angles. The first leans toward the humanist side of the spectrum. Here, shapes are open and relaxed, proportions are balanced, and the overall rhythm favors readability and comfort. The letterforms carry a natural flow that makes them particularly well suited for extended reading, editorial design, and any situation where subtlety and clarity take priority. The second subfamily, called Fizzy, turns up the energy considerably. While sharing the same underlying DNA, the Fizzy styles push the geometry further: shapes become more circular and defined, spacing tightens, and details appear sharper and more assertive. The result is a brighter, more graphic voice that shines in display settings, headlines, posters, and branding applications where a stronger typographic presence is needed. Where the humanist styles are calm and composed, Fizzy feels vibrant, crisp, and full of personality. Together, these two directions allow Paloma to operate across a surprisingly wide stylistic range. Designers can move seamlessly between a softer, more neutral tone and a more expressive and graphic one, all while maintaining a cohesive typographic system. This versatility makes the family particularly adaptable for projects that require both quiet text settings and impactful display moments within the same visual language. Although Paloma isn’t conceived as a traditional “workhorse” grotesk, it was carefully designed to perform across many practical scenarios. Its structure supports comfortable reading in longer texts while still offering enough character to stand out in headlines and larger compositions. The interplay between its humanist and geometric tendencies allows it to shift effortlessly from understated editorial typography to bold visual statements. The family includes 28 styles in total, organized into two subfamilies of seven weights, each accompanied by matching italics. In addition to the static fonts, Paloma is also available as a variable font, providing continuous control across the weight range and allowing for even greater flexibility in responsive and performance-driven typographic environments. Paloma also includes a wide set of OpenType features to support professional typesetting workflows, along with broad language support covering a large range of Latin-based writing systems. With its balanced mix of personality, adaptability, and typographic precision, PP Paloma aims to offer designers a tool that can move comfortably between quiet functionality and expressive flair—sometimes serious, sometimes playful, but always unmistakably lively."

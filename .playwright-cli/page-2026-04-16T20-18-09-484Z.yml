        - generic [ref=e238]: Whereas historians tend to view events as causally related manifestations of underlying processes, news stories tend to describe events in isolation, and to exclude discussion of the relationships between them. News conspicuously describes the world in the present or immediate past, even when the most important aspects of a news story have occurred long in the past—or are expected to occur in the future. To make the news, an ongoing process must have some "peg", an event in time that anchors it to the present moment. Relatedly, news often addresses aspects of reality which seem unusual, deviant, or out of the ordinary. Hence the famous dictum that "Dog Bites Man" is not news, but "Man Bites Dog" is. Another corollary of the newness of news is that, as new technology enables new media to disseminate news more quickly, 'slower' forms of communication may move away from 'news' towards 'analysis'. According to some theories, "news" is whatever the news industry sells. Journalism, broadly understood along the same lines, is the act or occupation of collecting and providing news. From a commercial perspective, news is simply one input, along with paper (or an electronic server) necessary to prepare a final product for distribution. A news agency supplies this resource "wholesale" and publishers enhance it for retail. Newsworthiness is defined as a subject having sufficient relevance to the public or a special audience to warrant press attention or coverage.

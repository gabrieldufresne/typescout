        - heading "Refined for Print. Ready for Screen." [level=2] [ref=e989]
        - paragraph [ref=e991]:
          - text: Editorial Sans is a typeface that seamlessly bridges the past and present, embodying a retro-modern aesthetic. Building on the legacy of its serif counterpart,
          - link "Editorial New" [ref=e992] [cursor=pointer]:
            - /url: /products/editorial-new
          - text: ", it retains the same proportions and metrics but with a sleek sans-serif design. Editorial Sans offers a clean and contemporary look while honoring its classic roots, making it ideal for a variety of design applications where elegance and modernity intersect. Its versatility shines in both digital and print mediums, from editorial layouts and branding to web design and advertising. Whether you’re crafting a minimalist logo or a sophisticated magazine spread, Editorial Sans provides the perfect balance of timeless charm and modern sophistication."
          - text: It comes in 16 meticulously crafted styles with true italics — a rare feature in Sans-serifs.

        - heading "Grace, With Sharp Edges." [level=2] [ref=e1041]
        - generic [ref=e1042]:
          - text: Acma is an irreverent typeface with a powerful elegance. It is ultimately precise and subtle yet it remains flowy and temperamental. The design was inspired by the Japanese modernist aesthetic as well as the fashion world [past, present and future] for its unapologetic nature and opulence through the purity and the tension of its lines yet unconventional forms and rhythms.
          - text: The design of the lowercase “a”, gave the tone to the whole family, which quickly became Acma. Its luscious curves, wide alternates and deep contrast will embellish any design endeavour it takes on. Guaranteed. It is a highly contrasted, narrow sans serif, ranging from thin to black. Originally intended for editorial headlines, Acma can be use in a variety of purpose starting at 12 point.
          - text: Acma includes a second set of wide uppercase, and alternative key characters in the lowercase. The use of these characters allows the designer to create a variety of unexpected moments. Acma comes in 10 weights with a variable cut for maximum versatility.
          - text: It is a celebration of idealistic beauty, express through tension, balance, unorthodox shapes.

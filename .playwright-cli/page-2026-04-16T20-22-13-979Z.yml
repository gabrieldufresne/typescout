        - generic [ref=e243]: Although the first fashion week was held in New York, the event itself derives from 'salon shows' ('défilés de mode' in French, literally 'fashion parades') in Paris couture salons. A fashion week consists of a week of organized events of multiple designer's collections. Before this organized event was recognized in New York City, fashion showings were being held in Paris as early as the 1700s. Some earlier showings were presented on mannequins which made it difficult for clients to see fashion pieces fully since they lacked the mobility of a model. These early showings were only to clients purchasing items and were shown on mannequins. In the 1800s, showings began to change. Charles Frederick Worth, noted for haute couture, began showing multiple pieces together and of a higher design. These designs were showcased to get the customer's attention in buying the pieces. Jeanne Paquin is the first designer to make her showings public and Paul Poiret is the first to host parties after his events. In the mid 1800s Mme Pauline von Metternich,[11] an Austrian Princess and wife to the Ambassador of Paris, saw one of Worth's sketches and employed him to make her a gown. He gained much recognition through his powerful clients and opened his own haute couture house in Paris in 1858, which sold luxury fashion to upper-class women.

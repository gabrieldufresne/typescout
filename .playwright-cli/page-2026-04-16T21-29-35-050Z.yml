        - heading "About" [level=3] [ref=e63]
        - generic [ref=e64]:
          - paragraph [ref=e65]: Bull-5, designed by David Einwaller, derives from a particular style of typewriter fonts that emerged in the 1960s, presumably introduced through Olivetti — an Italian manufacturer of office products.
          - paragraph [ref=e66]: The project began by digitizing printed type samples spotted on labels of photographic prints from the 1980s, which were sold due to the closure of an American newspaper archive. To preserve its raw and mechanical character, Bull-5’s Mono styles are drawn in coherence with the source material, including all their quirks and irregular proportions. They are accompanied by Proportional styles for greater legibility and Typewriter styles to embrace another iconic characteristic of typewriter fonts.
          - paragraph [ref=e67]: All styles are linked through bold punctuation and optional features like the double-width M, W, and their lowercase counterparts, along with typically serifed letters such as I, i, J, and j.

      - generic [ref=e80]:
        - heading "Why do I need a font license?" [level=2] [ref=e81]
        - paragraph [ref=e82]: Fonts are software and require a license for legal use. A license ensures type designers are fairly compensated for their work, which can take years to develop. While free fonts exist, they often come with limitations or quality issues. Professionals typically purchase licensed fonts from reputable sources.
      - generic [ref=e83]:
        - heading "What kind of license do I need?" [level=2] [ref=e84]
        - paragraph [ref=e85]:
          - text: Like any software, fonts are licensed for specific uses. All our licenses allow commercial use, but the right one depends on how you plan to use the fonts. The most common licenses cover desktop use for creating static content like images and print materials, web use for rendering live text via HTML and
          - code [ref=e86]: "@font-face"
          - text: CSS, and app use for embedding fonts in mobile applications. Less common uses include on-air broadcasts or incorporating fonts into video games.
        - list [ref=e87]:
          - listitem [ref=e88]:
            - text: A
            - strong [ref=e89]: web license
            - text: lets you host fonts on your website and display live text using HTML and
            - code [ref=e90]: "@font-face"
            - text: CSS. Pricing is based on the fonts licensed and monthly page views.
          - listitem [ref=e91]:
            - text: An
            - strong [ref=e92]: app license
            - text: allows you to embed fonts in a mobile app, with pricing based on the number of app titles. A single license covers distribution across platforms like iOS and Android.
          - listitem [ref=e93]:
            - text: A
            - strong [ref=e94]: desktop license
            - text: lets you install fonts on your computer to create static assets like logos, social media images, and print materials. Fonts must be outlined before export; embedding requires a separate license. Pricing is based on the number of users.
        - paragraph [ref=e95]:
          - strong [ref=e96]: "Note:"
          - text: Fonts uploaded to Canva for static images are covered under a desktop license, but live Canva Websites require a web license.

      - generic [ref=e128]:
        - heading "Do you offer large volume or tailored licensing options?" [level=2] [ref=e129]
        - paragraph [ref=e130]:
          - text: Absolutely. We provide enterprise licenses for high-volume use, broadcasting, and special platforms.
          - link "Reach out" [ref=e131] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: and we’ll tailor a solution for your needs.
      - generic [ref=e132]:
        - heading "Where can I purchase a font license?" [level=2] [ref=e133]
        - paragraph [ref=e134]:
          - text: For standard desktop, web, or app licenses, the quickest and easiest way to purchase is directly through our site. If you need an enterprise license or a custom solution,
          - link "contact us" [ref=e135] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: ", and we’ll be happy to assist."
      - generic [ref=e136]:
        - heading "What kind of font files do you provide?" [level=2] [ref=e137]
        - paragraph [ref=e138]:
          - text: Upon purchase, you’ll receive a download link for the font files. In order to minimize support issues, always use the files provided. If you need a different format or have another special request, please
          - link "contact us" [ref=e139] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: "and we will find the best solution for you. Below are the standard font file formats we provide with each kind of license:"
        - list [ref=e140]:
          - listitem [ref=e141]:
            - strong [ref=e142]: "Desktop/App:"
            - text: OpenType (OTF) and TrueType (TTF) files - variable fonts are provided as TTF.
          - listitem [ref=e143]:
            - strong [ref=e144]: "Web:"
            - text: Web Open Font Format (WOFF and WOFF2) — must be used as provided.
        - paragraph [ref=e145]:
          - emphasis [ref=e146]: Users are prohibited from converting desktop or application fonts for use as web fonts.
      - generic [ref=e147]:
        - heading "How many domains does a web font license cover?" [level=2] [ref=e148]
        - paragraph [ref=e149]:
          - text: A web font license covers one domain and its subdomains (e.g.,
          - strong [ref=e150]: mysite.com
          - text: and
          - strong [ref=e151]: store.mysite.com
          - text: ). It does not cover other domains (e.g.,
          - strong [ref=e152]: myothersite.com
          - text: ).
      - generic [ref=e153]:
        - heading "How do renewals work?" [level=2] [ref=e154]
        - paragraph [ref=e155]: Web and app licenses renew automatically using your original payment method. You’ll receive email reminders 30, 14, and 7 days before renewal. You can update your payment method or cancel anytime before renewal through the link provided on your original email receipt or in the email notifications leading up to renewal.
      - generic [ref=e156]:
        - heading "Can I try fonts before purchasing?" [level=2] [ref=e157]
        - paragraph [ref=e158]:
          - text: Yes. If you need to test fonts for internal mockups or client pitches,
          - link "contact us" [ref=e159] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: to arrange a trial license.
      - generic [ref=e160]:
        - heading "Do you offer student or non-profit discounts?" [level=2] [ref=e161]
        - paragraph [ref=e162]:
          - text: Yes. Students and non-profits can request a discount by
          - link "contacting us" [ref=e163] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: with proof of eligibility.
      - generic [ref=e164]:
        - heading "Can I create a subset of your web fonts?" [level=2] [ref=e165]
        - paragraph [ref=e166]:
          - text: We understand subsetting can be a tool to improve the performance of your website, but it also risks breaking a lot of the carefully designed features and language support in our fonts. For that reason we do not allow subsetting of our web fonts. If performance is a concern, consider using
          - link "preload hints" [ref=e167] [cursor=pointer]:
            - /url: https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/rel/preload
          - text: and the
          - link "font-display descriptor" [ref=e168] [cursor=pointer]:
            - /url: https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display
          - text: . For critical subsetting needs, please
          - link "contact us" [ref=e169] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: to discuss options.
      - generic [ref=e170]:
        - heading "Can I modify a font?" [level=2] [ref=e171]
        - paragraph [ref=e172]: Modifying font files to create derivative works is not permitted under any of our licenses. Fonts are carefully engineered for compatibility across applications. Opening the font in a font editor or tool such as Glyphs, FontForge, Font Squirrel, etc., modifying the outlines, and generating a new font file can break its deliberately designed functionality and create support issues.
        - paragraph [ref=e173]:
          - text: However, if you have a
          - strong [ref=e174]: desktop license
          - text: ", you may modify glyph outlines in design software (e.g., Illustrator) to create static assets like logos. If you need a custom version of a font, we would be happy to discuss modifying any of our fonts according to your needs, so please"
          - link "reach out" [ref=e175] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: .
      - generic [ref=e176]:
        - heading "Do you offer custom type design?" [level=2] [ref=e177]
        - paragraph [ref=e178]:
          - text: Definitely. We can customize fonts or create entirely new ones. Whether you need additional glyphs, new weights, or a bespoke typeface, we can help.
          - link "Contact us" [ref=e179] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: to discuss.
      - generic [ref=e180]:
        - heading "Can I get a refund?" [level=2] [ref=e181]
        - paragraph [ref=e182]:
          - text: Yes. If you purchased the wrong styles or changed your mind,
          - link "contact us" [ref=e183] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: "with your order confirmation email attached, and we’ll refund or replace your order. Note: After a refund, you may no longer use the fonts."
      - generic [ref=e184]:
        - heading "Can I get an invoice?" [level=2] [ref=e185]
        - paragraph [ref=e186]: Your order confirmation email includes a receipt section that serves as an invoice. It includes all necessary details (invoice ID, tax info, business name, etc.) that you can print out or save as a PDF for your records. We do not currently provide custom invoices for online orders.
      - generic [ref=e187]:
        - heading "Can I use my Tax ID at checkout?" [level=2] [ref=e188]
        - paragraph [ref=e189]: Yes. Select "I’m purchasing as a business" at checkout and enter your Tax ID. Our checkout process will calculate the correct tax amount automatically and the Tax ID will also appear on your receipt.
      - generic [ref=e190]:
        - heading "Can I update my business name, Tax ID, or licensee name after purchase?" [level=2] [ref=e191]
        - paragraph [ref=e192]:
          - text: We cannot edit existing orders, but we can issue a refund so you can place a corrected order. Please
          - link "contact us" [ref=e193] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: if you need assistance.
      - generic [ref=e194]:
        - heading "I received an email from licensing@tightype.com about my font license. Is it legitimate?" [level=2] [ref=e195]
        - paragraph [ref=e196]: Yes, the email is legitimate. It means we couldn’t find a record of a license for your website or app. Font licensing can be complex, and it’s easy to overlook usage limits or unintentionally use an incorrect license. There’s no need to worry — our goal is simply to ensure everything is in order. If you received an email from us, we’re happy to work with you to find the right solution.
      - generic [ref=e197]:
        - heading "I bought a license from a distributor like MyFonts, Creative Market, or Fontspring. Why are you asking me to verify my license?" [level=2] [ref=e198]
        - paragraph [ref=e199]: Distributors don’t always share license records with us. If we contact you, we likely need verification. Forward your order confirmation, and we’ll update our records.
      - generic [ref=e200]:
        - heading "Who are The Type Founders, and why did they contact me?" [level=2] [ref=e201]
        - paragraph [ref=e202]:
          - link "The Type Founders" [ref=e203] [cursor=pointer]:
            - /url: https://thetypefounders.com
          - text: owns and operates TIGHTYPE and other foundries. They handle sales and licensing for us, so our designers can focus on drawing more type.
      - generic [ref=e204]:
        - heading "I don’t have a license or may have the wrong one. What should I do?" [level=2] [ref=e205]
        - paragraph [ref=e206]: No problem — we’ll help you get the correct license for your website. Typically, this means purchasing a license that matches your site’s traffic and usage. If the fonts have been used without a license for a significant period, we may also discuss fair compensation based on the length of use and traffic volume. Our goal is to ensure proper licensing while fostering a positive, long-term relationship. We appreciate your support of type designers and are here to help.
      - generic [ref=e207]:
        - heading "The person who purchased our license left the company. What now?" [level=2] [ref=e208]
        - paragraph [ref=e209]:
          - text: We can help locate your license using an email, name, or domain.
          - link "Reach out" [ref=e210] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: and we’ll sort it out.
      - generic [ref=e211]:
        - heading "I have another question. Can I call you?" [level=2] [ref=e212]
        - paragraph [ref=e213]:
          - text: We’re a small team and don’t offer phone support. Please
          - link "contact us through the website" [ref=e214] [cursor=pointer]:
            - /url: mailto:info@tightype.com
          - text: ", and we’ll get back to you within 48 hours on weekdays."
